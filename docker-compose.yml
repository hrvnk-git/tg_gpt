services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    # важное изменение для окружения внутри docker: редис по имени сервиса
    environment:
      - REDIS_URL=redis://redis:6379/0

volumes:
  redis_data:

